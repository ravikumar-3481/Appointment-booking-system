<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow & Grace | Beauty Parlor Booking</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rose-50: #fff1f2;
            --rose-100: #ffe4e6;
            --rose-200: #fecdd3;
            --rose-400: #fb7185;
            --rose-500: #f43f5e;
            --rose-600: #e11d48;
            --rose-700: #be123c;
            --rose-900: #881337;
            
            --gray-50: #f9fafb;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;

            --green-100: #dcfce7;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-800: #166534;
            
            --red-50: #fef2f2;
            --red-200: #fecaca;
            --red-500: #ef4444;
            --red-800: #991b1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--rose-50);
            color: var(--gray-800);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Utility Classes */
        .hidden { display: none !important; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .text-center { text-align: center; }

        /* Main Card Container */
        .card {
            background-color: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 28rem;
            overflow: hidden;
            border: 1px solid var(--rose-100);
        }

        /* Header */
        .header {
            background-color: var(--rose-600);
            padding: 1.5rem;
            text-align: center;
            color: #ffffff;
        }
        .header svg {
            margin: 0 auto 0.5rem auto;
        }
        .header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            letter-spacing: 0.025em;
        }
        .header p {
            color: var(--rose-100);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--rose-100);
        }
        .tab-btn {
            flex: 1;
            padding: 1rem 0;
            font-size: 0.875rem;
            font-weight: 600;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gray-500);
        }
        .tab-btn:hover {
            color: var(--rose-500);
            background-color: var(--rose-50);
        }
        .tab-btn.active {
            color: var(--rose-600);
            border-bottom-color: var(--rose-600);
            background-color: var(--rose-50);
        }

        /* Content Area */
        .content-area {
            padding: 1.5rem;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 0.25rem;
        }
        .input-field {
            width: 100%;
            padding: 0.5rem 1rem;
            border: 1px solid var(--gray-300);
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: var(--rose-400);
            box-shadow: 0 0 0 2px rgba(251, 113, 133, 0.2);
        }
        .input-uppercase { text-transform: uppercase; }

        /* Hide number spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
        }
        .btn-primary {
            background-color: var(--rose-600);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-primary:hover { background-color: var(--rose-700); }
        
        .btn-secondary {
            background-color: var(--gray-800);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-secondary:hover { background-color: var(--gray-900); }

        .btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 1.25rem;
            height: 1.25rem;
            margin-left: 0.5rem;
            animation: spin 1s linear infinite;
        }
        .spinner circle { opacity: 0.25; stroke: currentColor; stroke-width: 4; }
        .spinner path { opacity: 0.75; fill: currentColor; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .btn.loading .spinner { display: block; }

        /* Alerts */
        .alert {
            display: flex;
            align-items: flex-start;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .alert-icon { margin-right: 0.5rem; margin-top: 0.125rem; }
        .alert-error {
            background-color: var(--red-50);
            color: var(--red-800);
            border: 1px solid var(--red-200);
        }
        .alert-success {
            background-color: var(--green-100);
            color: var(--green-800);
            border: 1px solid var(--green-200);
        }

        /* Success View */
        .success-view {
            text-align: center;
            padding: 1rem 0;
        }
        .success-icon-bg {
            width: 4rem;
            height: 4rem;
            background-color: var(--green-100);
            color: var(--green-500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
        }
        .success-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 0.5rem;
        }
        .success-desc {
            color: var(--gray-600);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        .id-card {
            background-color: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .id-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .id-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--rose-600);
            letter-spacing: 0.1em;
        }
        .link-btn {
            background: none;
            border: none;
            color: var(--rose-600);
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer;
        }
        .link-btn:hover { color: var(--rose-700); }

        /* Results View */
        .results-card {
            margin-top: 1.5rem;
            background-color: var(--rose-50);
            border: 1px solid var(--rose-100);
            border-radius: 0.5rem;
            padding: 1.25rem;
        }
        .results-title {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            color: var(--rose-900);
            border-bottom: 1px solid var(--rose-200);
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        .result-label { color: var(--gray-500); }
        .result-value { font-weight: 500; color: var(--gray-800); }
        .status-badge {
            font-weight: 600;
            color: var(--green-600);
            background-color: var(--green-100);
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
        }
        .divider {
            border-top: 1px solid var(--rose-200);
            margin-top: 0.5rem;
            padding-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="card">
        
        <!-- Header -->
        <div class="header">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
            </svg>
            <h1 class="font-serif">Glow & Grace</h1>
            <p>Premium Beauty Parlor</p>
        </div>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button onclick="switchTab('book')" id="tab-book" class="tab-btn active">Book Appointment</button>
            <button onclick="switchTab('check')" id="tab-check" class="tab-btn">Check Status</button>
        </div>

        <div class="content-area">
            
            <!-- Alert Box -->
            <div id="alert-box" class="alert hidden">
                <span id="alert-icon" class="alert-icon"></span>
                <span id="alert-text"></span>
            </div>

            <!-- ========================================== -->
            <!-- TAB 1: BOOK APPOINTMENT FORM               -->
            <!-- ========================================== -->
            <div id="content-book" class="tab-content active">
                <form id="bookingForm" onsubmit="handleBooking(event)">
                    
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="input-field" required placeholder="e.g. Jane Doe">
                    </div>

                    <div class="form-group">
                        <label for="mobile">Mobile Number</label>
                        <input type="number" id="mobile" class="input-field" required placeholder="e.g. 9876543210">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" class="input-field" required>
                        </div>
                        <div class="form-group">
                            <label for="time">Time</label>
                            <input type="time" id="time" class="input-field" required>
                        </div>
                    </div>

                    <button type="submit" id="btn-submit" class="btn btn-primary">
                        <span id="btn-submit-text">Confirm Booking</span>
                        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>

                <!-- Success State -->
                <div id="booking-success" class="success-view hidden">
                    <div class="success-icon-bg">
                        <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h2 class="font-serif success-title">Booking Confirmed!</h2>
                    <p class="success-desc">Your appointment has been successfully scheduled.</p>
                    <div class="id-card">
                        <p class="id-label">Your Appointment ID</p>
                        <p id="success-id" class="id-value">BP-XXXXX</p>
                        <p style="font-size: 0.75rem; color: var(--gray-400); margin-top: 0.5rem;">Please save this ID to check your status later.</p>
                    </div>
                    <button type="button" onclick="resetBookingForm()" class="link-btn">Book another appointment</button>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- TAB 2: CHECK STATUS FORM                   -->
            <!-- ========================================== -->
            <div id="content-check" class="tab-content">
                <form id="checkForm" onsubmit="handleCheck(event)">
                    
                    <!-- Search Mode Selection -->
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; background: var(--rose-50); padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--rose-100);">
                        <label style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; font-size: 0.875rem; font-weight: 500;">
                            <input type="radio" name="searchType" value="id" checked onchange="toggleSearchUI()"> Search by ID
                        </label>
                        <label style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; font-size: 0.875rem; font-weight: 500;">
                            <input type="radio" name="searchType" value="details" onchange="toggleSearchUI()"> Mobile + Date
                        </label>
                    </div>

                    <!-- ID Search -->
                    <div class="form-group" id="search-id-group">
                        <label for="searchId">Enter Appointment ID</label>
                        <input type="text" id="searchId" class="input-field input-uppercase" placeholder="e.g. BP-12345">
                    </div>

                    <!-- Mobile & Date Search -->
                    <div id="search-details-group" class="hidden">
                        <div class="form-group">
                            <label for="searchMobile">Mobile Number</label>
                            <input type="number" id="searchMobile" class="input-field" placeholder="e.g. 9876543210">
                        </div>
                        <div class="form-group">
                            <label for="searchDate">Appointment Date</label>
                            <input type="date" id="searchDate" class="input-field">
                        </div>
                    </div>
                    
                    <button type="submit" id="btn-check" class="btn btn-secondary">
                        <span id="btn-check-text">Check Details</span>
                        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>

                <!-- Check Results -->
                <div id="check-results" class="results-card hidden">
                    <h3 class="results-title">Appointment Details</h3>
                    
                    <div class="result-row">
                        <span class="result-label">Name:</span> 
                        <span id="res-name" class="result-value"></span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Mobile:</span> 
                        <span id="res-mobile" class="result-value"></span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Date:</span> 
                        <span id="res-date" class="result-value"></span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">Time:</span> 
                        <span id="res-time" class="result-value"></span>
                    </div>
                    
                    <div class="result-row divider">
                        <span class="result-label">Status:</span> 
                        <span class="status-badge">Confirmed</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Updated Google Apps Script Web App URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxbuBH9i8FVQIkgZ-41wrXB9cKCQHUSsESznDN9M48hhBw9sOwTFxcOaRNgW-KcOxYoAQ/exec'; 
        
        // UI Init Toggle (Naya Function)
        function toggleSearchUI() {
            const type = document.querySelector('input[name="searchType"]:checked').value;
            if (type === 'id') {
                document.getElementById('search-id-group').classList.remove('hidden');
                document.getElementById('search-details-group').classList.add('hidden');
            } else {
                document.getElementById('search-id-group').classList.add('hidden');
                document.getElementById('search-details-group').classList.remove('hidden');
            }
        }
        document.addEventListener('DOMContentLoaded', toggleSearchUI);

        // 1. Tab Switching Logic
        function switchTab(tab) {
            hideAlert();
            document.getElementById('check-results').classList.add('hidden');
            
            const isBook = tab === 'book';
            
            const tabBookBtn = document.getElementById('tab-book');
            const tabCheckBtn = document.getElementById('tab-check');
            
            if (isBook) {
                tabBookBtn.classList.add('active');
                tabCheckBtn.classList.remove('active');
            } else {
                tabBookBtn.classList.remove('active');
                tabCheckBtn.classList.add('active');
            }

            document.getElementById('content-book').classList.toggle('active', isBook);
            document.getElementById('content-check').classList.toggle('active', !isBook);
        }

        // Set minimum date to today for the booking calendar
        const dateInput = document.getElementById('date');
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);

        // 2. Handle Booking Submission
        async function handleBooking(event) {
            event.preventDefault();
            hideAlert();

            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;

            if(mobile.length < 10) {
                showAlert('error', 'Please enter a valid mobile number.');
                return;
            }

            setLoading('btn-submit', true, 'Booking...');

            // FRONTEND PAR HI ID GENERATE KAREIN (Taki server ka wait na karna pade)
            const generatedId = "BP-" + Math.floor(10000 + Math.random() * 90000);
            const payload = { id: generatedId, name, mobile, date, time };

            try {
                // Background me data send karein (No-cors aur async se request fast hoti hai)
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8', 
                    },
                    body: JSON.stringify(payload)
                }).catch(e => console.error("Background sync error", e));
                
                // Bina Google ke response ka wait kiye turant success dikhayein! (Instant Feel)
                setTimeout(() => {
                    document.getElementById('bookingForm').reset();
                    document.getElementById('bookingForm').classList.add('hidden');
                    document.getElementById('booking-success').classList.remove('hidden');
                    document.getElementById('success-id').innerText = generatedId;
                    setLoading('btn-submit', false, 'Confirm Booking');
                }, 600); // 0.6 sec ka chhota sa delay taaki real loading feel aaye

            } catch (error) {
                showAlert('error', 'Booking failed. Please check your network connection.');
                console.error("Fetch error:", error);
                setLoading('btn-submit', false, 'Confirm Booking');
            }
        }

        // 3. Handle Status Checking
        async function handleCheck(event) {
            event.preventDefault();
            hideAlert();
            document.getElementById('check-results').classList.add('hidden');

            const searchType = document.querySelector('input[name="searchType"]:checked').value;
            let queryUrl = '';

            // Check karo ki user ne ID select kiya hai ya Mobile + Date
            if (searchType === 'id') {
                let searchId = document.getElementById('searchId').value.trim().toUpperCase();
                if(!searchId) { showAlert('error', 'Please enter an Appointment ID.'); return; }
                queryUrl = `${GOOGLE_SCRIPT_URL}?id=${searchId}`;
            } else {
                let mobile = document.getElementById('searchMobile').value.trim();
                let date = document.getElementById('searchDate').value;
                if(!mobile || !date) { showAlert('error', 'Please enter both Mobile and Date.'); return; }
                queryUrl = `${GOOGLE_SCRIPT_URL}?mobile=${mobile}&date=${date}`;
            }

            setLoading('btn-check', true, 'Searching...');

            try {
                const response = await fetch(queryUrl, {
                    method: 'GET'
                });
                
                const data = await response.json();

                if (data && data.name) { 
                    document.getElementById('res-name').innerText = data.name;
                    document.getElementById('res-mobile').innerText = data.mobile;
                    
                    // Format Date according to Indian Timezone (IST)
                    const d = new Date(data.date);
                    document.getElementById('res-date').innerText = d.toLocaleDateString('en-IN', { 
                        timeZone: 'Asia/Kolkata', 
                        weekday: 'short', 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                    });
                    
                    // Format Time to 12-hour AM/PM format (Indian Style)
                    let timeStr = data.time;
                    if(timeStr && timeStr.includes(':')) {
                        let [hours, minutes] = timeStr.split(':');
                        let ampm = hours >= 12 ? 'PM' : 'AM';
                        hours = hours % 12 || 12; // Convert 24h to 12h
                        timeStr = `${hours}:${minutes} ${ampm}`;
                    }
                    document.getElementById('res-time').innerText = timeStr;

                    document.getElementById('check-results').classList.remove('hidden');
                    document.getElementById('checkForm').reset();
                } else {
                    showAlert('error', `No appointment found with the provided details.`);
                }

            } catch (error) {
                showAlert('error', 'Error fetching data. Ensure your Apps Script allows GET requests and is deployed correctly.');
                console.error(error);
            } finally {
                setLoading('btn-check', false, 'Check Details');
            }
        }

        // Helper Functions
        function resetBookingForm() {
            document.getElementById('bookingForm').reset();
            document.getElementById('bookingForm').classList.remove('hidden');
            document.getElementById('booking-success').classList.add('hidden');
        }

        function setLoading(buttonId, isLoading, text) {
            const btn = document.getElementById(buttonId);
            const textSpan = document.getElementById(`${buttonId}-text`);
            
            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('loading');
                textSpan.innerText = text;
            } else {
                btn.disabled = false;
                btn.classList.remove('loading');
                textSpan.innerText = text;
            }
        }

        function showAlert(type, message) {
            const box = document.getElementById('alert-box');
            const icon = document.getElementById('alert-icon');
            const text = document.getElementById('alert-text');
            
            box.className = `alert ${type === 'error' ? 'alert-error' : 'alert-success'}`;
            
            icon.innerHTML = type === 'error' 
                ? `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                
            text.innerText = message;
            box.classList.remove('hidden');
        }

        function hideAlert() {
            document.getElementById('alert-box').classList.add('hidden');
        }
    </script>
</body>
</html>
